name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Zip Add-on
        env:
          VERSION: ${{ github.ref_name }}
        run: ./build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/anki_statistics_extended.ankiaddon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to AnkiWeb
        uses: lmallez/anki-addon-publish-action@main
        with:
          file: dist/anki_statistics_extended.ankiaddon
          anki-user: ${{ secrets.ANKI_USER }}
          anki-password: ${{ secrets.ANKI_PASSWORD }}
          id: 1388408398
          name: Anki Statistics Extended
          support-page: https://github.com/lmallez/anki-statistic-extended
          tags: anki,statistics
          description: Adds polished Plotly-based charts to Anki's stats screen for tag and unit progress tracking.
